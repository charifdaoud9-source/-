<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس - مشاهدة مباشرة</title>
    <style>
        :root { --primary: #ff0000; --bg: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--primary); font-size: 24px; font-weight: bold; text-decoration: none; }

        /* الصورة الكبيرة لناروتو */
        .hero {
            height: 60vh;
            background: linear-gradient(to top, var(--bg), transparent), url('https://wallpapercave.com/wp/wp1810629.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 5%;
        }

        .container { padding: 20px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }

        /* تصميم البطاقات بدون صور مكسورة */
        .card {
            background: var(--card-bg); border-radius: 12px; padding: 30px 15px;
            text-align: center; cursor: pointer; transition: 0.3s;
            border: 1px solid #333; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); background: #222; }
        .card i { font-size: 40px; display: block; margin-bottom: 10px; }
        .card h3 { margin: 10px 0 5px 0; font-size: 18px; }
        .card p { font-size: 13px; color: #888; margin: 0; }

        /* مشغل الفيديو المنبثق */
        #videoPlayer {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        iframe { width: 80%; height: 70%; border: 2px solid var(--primary); border-radius: 10px; }
        .close-btn { margin-top: 20px; padding: 10px 30px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <span>قائمة الحلقات</span>
    </header>

    <section class="hero">
        <div>
            <h1 style="font-size: 3.5rem; margin: 0;">ناروتو شيبودن</h1>
            <p style="font-size: 1.2rem; max-width: 500px;">شاهد أقوى معارك النينجا الآن بجودة عالية.</p>
        </div>
    </section>

    <div class="container">
        <h2>اختر مسلسلك المفضل</h2>
        <div class="grid">
            
            <div class="card" onclick="playVideo('https://www.youtube.com/embed/QY_oMofN_m0')">
                <div style="font-size: 40px;">🥷</div>
                <h3>ناروتو</h3>
                <p>اضغط للمشاهدة</p>
            </div>

            <div class="card" onclick="playVideo('https://www.youtube.com/embed/S2p_vU29K6w')">
                <div style="font-size: 40px;">🏴‍☠️</div>
                <h3>ون بيس</h3>
                <p>اضغط للمشاهدة</p>
            </div>

            <div class="card" onclick="playVideo('https://www.youtube.com/embed/m9un6pT020Q')">
                <div style="font-size: 40px;">🎯</div>
                <h3>القناص</h3>
                <p>اضغط للمشاهدة</p>
            </div>

            <div class="card" onclick="playVideo('https://www.youtube.com/embed/N-0_D9m8i4c')">
                <div style="font-size: 40px;">🔍</div>
                <h3>كونان</h3>
                <p>اضغط للمشاهدة</p>
            </div>

        </div>
    </div>

    <div id="videoPlayer">
        <iframe id="mainFrame" src="" frameborder="0" allowfullscreen></iframe>
        <button class="close-btn" onclick="closeVideo()">إغلاق المشغل</button>
    </div>

    <script>
        function playVideo(url) {
            document.getElementById('mainFrame').src = url;
            document.getElementById('videoPlayer').style.display = 'flex';
        }
        function closeVideo() {
            document.getElementById('videoPlayer').style.display = 'none';
            document.getElementById('mainFrame').src = '';
        }
    </script>

</body>
</html>
