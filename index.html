<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم الكرتون - Cartoon World</title>
    <style>
        :root {
            --primary: #e50914;
            --bg: #141414;
            --card-bg: #2f2f2f;
        }
        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
        }
        /* الشريط العلوي */
        header {
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, transparent);
            padding: 20px 4%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 92%;
            z-index: 1000;
        }
        .logo { color: var(--primary); font-size: 28px; font-weight: bold; text-decoration: none; }
        .search-bar {
            background: rgba(0,0,0,0.75);
            border: 1px solid white;
            color: white;
            padding: 7px 15px;
            border-radius: 4px;
            width: 250px;
        }

        /* القسم الرئيسي (البانر) */
        .hero {
            height: 70vh;
            background: linear-gradient(to right, var(--bg) 10%, transparent), url('https://images.alphacoders.com/605/605592.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 4%;
        }
        .hero-content h1 { font-size: 3rem; margin-bottom: 10px; }
        .hero-content p { max-width: 500px; font-size: 1.2rem; margin-bottom: 20px; color: #ccc; }
        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn-play { background-color: white; color: black; }
        .btn-info { background-color: rgba(109, 109, 110, 0.7); color: white; }

        /* شبكة الكرتون */
        .content-section { padding: 40px 4%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .card {
            background: var(--card-bg);
            border-radius: 4px;
            overflow: hidden;
            transition: transform 0.3s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { transform: scale(1.1); z-index: 10; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-title { padding: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <input type="text" class="search-bar" placeholder="بحث...">
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>ناروتو شيبودن</h1>
            <p>بعد عامين ونصف من التدريب، يعود ناروتو إلى قريته ليواجه تحديات جديدة ومنظمة الأكاتسكي الغامضة.</p>
            <button class="btn btn-play">▶ تشغيل</button>
            <button class="btn btn-info">ⓘ مزيد من المعلومات</button>
        </div>
    </section>

    <section class="content-section">
        <h2>أحدث الإضافات</h2>
        <div class="grid">
            <div class="card">
                <img src="https://m.media-amazon.com/images/M/MV5BZmQ5NGFiNWEtMmMyMC00YzcwLWIyOTYtMzU1NWUxZTMwOTFlXkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg" alt="ناروتو">
                <div class="card-title">ناروتو شيبودن</div>
            </div>
            <div class="card">
                <img src="https://m.media-amazon.com/images/M/MV5BODcwNWE3OTItMDdmMi00MjhlLTk1MDktNGRkMDA4NDczYWVjXkEyXkFqcGdeQXVyNTAyODkwOQ@@._V1_.jpg" alt="ون بيس">
                <div class="card-title">ون بيس</div>
            </div>
            <div class="card">
                <img src="https://m.media-amazon.com/images/M/MV5BN2ZmMjA0ZDMtZDAxMy00ZWRjLWEwYmEtNWY5ZmE5MWMwY2E1XkEyXkFqcGdeQXVyMTMxODk2OTU@._V1_.jpg" alt="القناص">
                <div class="card-title">القناص (Hunter x Hunter)</div>
            </div>
            <div class="card">
                <img src="https://m.media-amazon.com/images/M/MV5BMjA3NTYxYTMtMTdjOS00MTNmLWE3YzEtN2I5ZTU1ZmM4OWY3XkEyXkFqcGdeQXVyNTAyODkwOQ@@._V1_.jpg" alt="أبطال الديجيتال">
                <div class="card-title">أبطال الديجيتال</div>
            </div>
        </div>
    </section>

</body>
</html>
