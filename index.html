<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس | الواجهة الاحترافية</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* رأس الصفحة الزجاجي */
        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 69, 0, 0.3);
        }

        .logo {
            color: var(--primary);
            font-size: 30px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* الواجهة الكبيرة المتحركة (Hero) */
        .hero-slider {
            height: 75vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 3s ease;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
            transform: scale(1.05);
        }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg) 5%, transparent 60%),
                        linear-gradient(to right, var(--bg) 20%, transparent);
            z-index: 3;
        }

        .hero-content {
            position: relative;
            z-index: 4;
            max-width: 700px;
            animation: fadeInUp 1s ease;
        }

        .hero-content h1 { font-size: 4.5rem; margin: 0; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        .hero-content p { font-size: 1.3rem; color: #eee; margin: 20px 0; line-height: 1.6; }

        /* التبويبات */
        .tabs-wrapper {
            margin-top: -30px;
            padding: 20px 5%;
            position: sticky;
            top: 70px;
            z-index: 900;
            background: var(--bg);
        }

        .tabs-list {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-item {
            background: var(--card-bg);
            border: 1px solid #333;
            color: white;
            padding: 12px 35px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
            white-space: nowrap;
        }

        .tab-item.active, .tab-item:hover {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 69, 0, 0.4);
        }

        /* شبكة الحلقات الجذابة */
        .grid-container { padding: 40px 5%; }
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 35px;
        }

        .ep-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .ep-card:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        .ep-thumb {
            height: 160px;
            background: linear-gradient(135deg, #1a1a1a, #000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 55px;
            position: relative;
        }

        .play-icon-overlay {
            position: absolute;
            color: white;
            opacity: 0;
            transition: 0.3s;
            font-size: 50px;
        }

        .ep-card:hover .play-icon-overlay { opacity: 1; }

        .ep-info { padding: 20px; }
        .ep-info h3 { margin: 0; font-size: 18px; color: #fff; }
        .ep-info p { color: #777; font-size: 13px; margin-top: 10px; line-height: 1.4; }

        /* صفحة المشاهدة */
        #watchPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            overflow-y: auto;
        }

        .player-nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0a0a0a;
        }

        iframe {
            width: 90%;
            height: 75vh;
            border: none;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.1);
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <div style="display:flex; align-items:center; gap:20px;">
            <span class="material-icons" style="cursor:pointer">search</span>
            <span class="material-icons" style="cursor:pointer">person_outline</span>
        </div>
    </header>

    <div class="hero-slider" id="slider">
        <div class="slide active" style="background-image: url('https://wallpapercave.com/wp/wp1810629.jpg')"></div>
        <div class="slide" style="background-image: url('https://wallpapercave.com/wp/wp1852230.jpg')"></div>
        <div class="slide" style="background-image: url('https://wallpaperaccess.com/full/332219.jpg')"></div>
        
        <div class="hero-overlay"></div>
        
        <div class="hero-content">
            <h1 id="heroTitle">عالم ناروتو</h1>
            <p id="heroDesc">استكشف أقوى معارك النينجا في تاريخ الأنمي، بجودة فائقة الدقة وباللغة العربية الفصحى.</p>
            <button class="tab-item active" style="padding: 15px 50px; font-size: 18px;" onclick="document.getElementById('grid-start').scrollIntoView({behavior:'smooth'})">ابدأ الاستكشاف</button>
        </div>
    </div>

    <div class="tabs-wrapper" id="grid-start">
        <div class="tabs-list">
            <button class="tab-item active" onclick="filter('all', this)">الكل</button>
            <button class="tab-item" onclick="filter('naruto', this)">ناروتو</button>
            <button class="tab-item" onclick="filter('gumball', this)">غامبول</button>
            <button class="tab-item" onclick="filter('onepiece', this)">ون بيس</button>
            <button class="tab-item" onclick="filter('doraemon', this)">دورايمون</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="episodes-grid" id="mainGrid"></div>
    </div>

    <div id="watchPage">
        <div class="player-nav">
            <button class="tab-item" onclick="closeWatch()"><span class="material-icons" style="vertical-align:middle">arrow_forward</span> العودة</button>
            <h2 id="watchTitle" style="margin:0">اسم الحلقة</h2>
            <div style="width:100px"></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; padding-top:20px;">
            <iframe id="videoIframe" src="" allowfullscreen></iframe>
            <div style="width:90%; padding:30px 0;">
                <div style="display:flex; gap:20px; margin-bottom:20px;">
                    <button class="tab-item active"><span class="material-icons">thumb_up</span> 1.2K</button>
                    <button class="tab-item"><span class="material-icons">share</span> مشاركة</button>
                    <button class="tab-item" style="margin-right:auto; background:#222;"><span class="material-icons">download</span> تنزيل</button>
                </div>
                <div style="background:#111; padding:25px; border-radius:15px; border-right:4px solid var(--primary);">
                    <h3 style="color:var(--primary); margin-top:0;">وصف الحلقة</h3>
                    <p id="watchDesc" style="line-height:1.8; color:#ccc;"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const episodes = [
            { cat: 'naruto', title: 'ناروتو: البداية الأسطورية', desc: 'الحلقة الأولى من رحلة ناروتو لاستعادة كرامته وتحقيق حلمه في أن يصبح الهوكاجي.' },
            { cat: 'naruto', title: 'ناروتو: اختبار النينجا', desc: 'مواجهة حاسمة بين الفريق السابع وكاكاشي سينسي في غابة الموت.' },
            { cat: 'gumball', title: 'غامبول: الفوضى الكبرى', desc: 'مغامرة كوميدية تقلب موازين مدينة إلمور بسبب خطأ بسيط من غامبول.' },
            { cat: 'onepiece', title: 'ون بيس: فجر المغامرة', desc: 'لوفي يبدأ رحلته في المحيط بحثاً عن طاقم لبدء أعظم قصة قراصنة.' },
            { cat: 'doraemon', title: 'دورايمون: الحقيبة العجيبة', desc: 'نوبيتا يكتشف أداة جديدة من حقيبة دورايمون تغير مجرى يومه بالكامل.' }
            // يمكنك إضافة الـ 20 حلقة هنا بنفس النمط
        ];

        // تعبئة الـ 20 حلقة تلقائياً للعرض
        for(let i=1; i<=15; i++) {
            episodes.push({
                cat: i%2==0 ? 'naruto' : 'gumball',
                title: `حلقة إضافية رقم ${i}`,
                desc: 'هذه حلقة ممتعة مضافة لتكملة القائمة الخاصة بك بجودة عالية.'
            });
        }

        // تحريك الواجهة الكبيرة
        let slideIndex = 0;
        const slides = document.querySelectorAll('.slide');
        const titles = ["عالم ناروتو", "مغامرات ون بيس", "كوميديا غامبول"];
        const descs = [
            "استكشف أقوى معارك النينجا في تاريخ الأنمي.",
            "انطلق في رحلة البحث عن الكنز الأسطوري ون بيس.",
            "اضحك من قلبك مع مغامرات غامبول وداروين المجنونة."
        ];

        function nextSlide() {
            slides[slideIndex].classList.remove('active');
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add('active');
            
            document.getElementById('heroTitle').innerText = titles[slideIndex];
            document.getElementById('heroDesc').innerText = descs[slideIndex];
        }
        setInterval(nextSlide, 5000);

        // وظائف العرض والفلترة
        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map(ep => `
                <div class="ep-card" onclick="openWatch('${ep.title}', '${ep.desc}')">
                    <div class="ep-thumb">
                        <span class="material-icons play-icon-overlay">play_circle_filled</span>
                        ${ep.cat === 'naruto' ? '🦊' : (ep.cat === 'onepiece' ? '🏴‍☠️' : '🐱')}
                    </div>
                    <div class="ep-info">
                        <h3>${ep.title}</h3>
                        <p>${ep.desc.substring(0, 70)}...</p>
                    </div>
                </div>
            `).join('');
        }

        function filter(c, btn) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid(c === 'all' ? episodes : episodes.filter(e => e.cat === c));
        }

        function openWatch(title, desc) {
            document.getElementById('watchTitle').innerText = title;
            document.getElementById('watchDesc').innerText = desc;
            document.getElementById('watchPage').style.display = 'block';
            document.body.style.overflow = 'hidden';
            // هنا نضع روابط الفيديو لاحقاً
        }

        function closeWatch() {
            document.getElementById('watchPage').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        renderGrid(episodes);
    </script>
</body>
</html>
