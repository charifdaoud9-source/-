<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم ناروتو - الواجهة المشرقة</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500; /* لون ناروتو البرتقالي */
            --bg: #ffffff;
            --card-bg: #f8f9fa;
            --text: #333;
            --shiny: linear-gradient(45deg, #ff4500, #feb47b, #ff4500);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* تأثيرات براقة في الخلفية */
        .glow-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255, 69, 0, 0.05), transparent);
            z-index: -1;
        }

        header {
            padding: 20px 5%;
            background: white;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            background: var(--shiny);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(255, 69, 0, 0.2);
        }

        /* قسم ناروتو الرئيسي */
        .hero-section {
            text-align: center;
            padding: 60px 20px;
        }

        .naruto-main-card {
            display: inline-block;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            border: 2px solid #fff;
            transition: 0.4s;
            cursor: pointer;
            position: relative;
        }

        .naruto-main-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(255, 69, 0, 0.15);
            border-color: var(--primary);
        }

        .naruto-icon {
            font-size: 100px;
            background: var(--shiny);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        .shiny-btn {
            background: var(--shiny);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 69, 0, 0.3);
            transition: 0.3s;
        }

        .shiny-btn:hover {
            box-shadow: 0 15px 30px rgba(255, 69, 0, 0.5);
            transform: scale(1.05);
        }

        /* مشغل الفيديو المنبثق */
        #videoOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .player-container {
            width: 90%;
            max-width: 1000px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            border: 5px solid white;
        }

        video { width: 100%; display: block; }

        /* شريط أزرار التحكم الفاخر */
        .interaction-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #fff;
            width: 100%;
            max-width: 1000px;
            margin-top: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .inter-btn {
            background: none; border: none; color: #555;
            cursor: pointer; display: flex; flex-direction: column;
            align-items: center; gap: 8px; font-weight: 600;
        }

        .inter-btn:hover { color: var(--primary); }
        .inter-btn .material-icons { font-size: 30px; }

        .close-btn {
            position: absolute; top: 20px; right: 20px;
            background: #eee; border: none; width: 50px; height: 50px;
            border-radius: 50%; cursor: pointer; font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="glow-bg"></div>

    <header>
        <div class="logo">ناروتو بلس ✨</div>
    </header>

    <section class="hero-section">
        <div class="naruto-main-card" onclick="openPlayer()">
            <div class="naruto-icon">🦊</div>
            <h1 style="color: #333;">ناروتو شيبودن: الحلقة 1</h1>
            <p style="color: #777; margin-bottom: 30px;">اضغط على الأيقونة لبدء المغامرة البراقة</p>
            <button class="shiny-btn">شاهد الآن ✨</button>
        </div>
    </section>

    <div id="videoOverlay">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        
        <div class="player-container">
            <video id="videoElement" controls>
                <source src="naruto1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="interaction-bar">
            <button class="inter-btn"><span class="material-icons">thumb_up</span>إعجاب</button>
            <button class="inter-btn"><span class="material-icons">thumb_down</span>ديسلايك</button>
            <button class="inter-btn"><span class="material-icons">share</span>مشاركة</button>
            <button class="inter-btn"><span class="material-icons">playlist_add</span>حفظ</button>
            <a href="naruto1.mp4" download class="inter-btn" style="text-decoration:none; color:inherit;">
                <span class="material-icons">cloud_download</span>تنزيل
            </a>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('videoOverlay');
        const video = document.getElementById('videoElement');

        function openPlayer() {
            overlay.style.display = 'flex';
            video.play();
        }

        function closePlayer() {
            overlay.style.display = 'none';
            video.pause();
        }
    </script>

</body>
</html>
