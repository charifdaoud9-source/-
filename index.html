<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس | عالم الترفيه اللامتناهي</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #e50914;
            --bg: #080808;
            --card-bg: #141414;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* الشريط العلوي الثابت */
        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.95);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid #222;
        }

        .logo {
            color: var(--primary);
            font-size: 28px;
            font-weight: bold;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.5);
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #444;
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            width: 250px;
            outline: none;
            transition: 0.3s;
        }

        .search-bar:focus { width: 350px; border-color: var(--primary); }

        /* منطقة الهيرو المتغيرة */
        .hero {
            height: 65vh;
            display: flex;
            align-items: center;
            padding: 0 5%;
            background-size: cover;
            background-position: center;
            transition: background-image 1.5s ease-in-out;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg), transparent 70%),
                        linear-gradient(to right, var(--bg), transparent);
        }

        .hero-content { position: relative; z-index: 10; max-width: 700px; }
        .hero-content h1 { font-size: 4rem; margin: 0; text-shadow: 2px 2px 20px #000; }
        .hero-content p { font-size: 1.2rem; color: #ddd; margin: 20px 0; line-height: 1.6; }

        /* التبويبات */
        .tabs-container {
            padding: 20px 5%;
            display: flex;
            gap: 15px;
            background: var(--bg);
            position: sticky;
            top: 70px;
            z-index: 900;
            overflow-x: auto;
        }

        .tab-btn {
            background: #222;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            white-space: nowrap;
            transition: 0.3s;
        }

        .tab-btn.active, .tab-btn:hover { background: var(--primary); }

        /* شبكة الحلقات */
        .container { padding: 40px 5%; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: 0.4s;
            cursor: pointer;
            border: 1px solid #222;
        }

        .card:hover {
            transform: scale(1.08);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }

        .card-img {
            height: 130px;
            background: linear-gradient(45deg, #1a1a1a, #333);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
        }

        .card-info { padding: 15px; }
        .card-info h3 { margin: 0; font-size: 16px; color: #fff; }
        .card-info p { color: #aaa; font-size: 12px; margin-top: 8px; line-height: 1.4; }

        /* صفحة المشاهدة الكاملة */
        #playerPage {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            overflow-y: auto;
        }

        .player-header {
            padding: 15px 5%;
            background: #111;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .video-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #000;
        }

        iframe {
            width: 90%;
            height: 80vh;
            border: none;
            background: #000 url('https://i.stack.imgur.com/ATB3o.gif') center no-repeat; /* لودر بسيط */
        }

        .interaction-area {
            width: 90%;
            max-width: 1100px;
            padding: 30px 0;
        }

        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .btn-action {
            background: #222;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-action:hover { background: #333; color: var(--primary); }

        .desc-section { background: #1a1a1a; padding: 25px; border-radius: 8px; margin-bottom: 30px; }
        .desc-section h3 { margin-top: 0; color: var(--primary); }

        /* قسم التعليقات */
        .comments-box { margin-top: 40px; }
        .comment-input {
            width: 100%;
            background: none;
            border: none;
            border-bottom: 1px solid #444;
            color: white;
            padding: 15px 0;
            margin-bottom: 30px;
            outline: none;
        }

        .comment-item { display: flex; gap: 15px; margin-bottom: 25px; }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .dimmer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1999; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div class="dimmer" id="lightDimmer"></div>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <input type="text" class="search-bar" placeholder="ابحث عن حلقتك المفضلة...">
    </header>

    <section class="hero" id="mainHero">
        <div class="hero-content">
            <h1 id="heroTitle">عالم ناروتو شيبودن</h1>
            <p id="heroDesc">استمتع بأقوى معارك النينجا والمغامرات الأسطورية بجودة عالية وبدون انقطاع.</p>
            <button class="tab-btn active" style="padding: 15px 40px;" onclick="playSelected(0)">ابدأ المشاهدة الآن</button>
        </div>
    </section>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="filterData('all', this)">الكل</button>
        <button class="tab-btn" onclick="filterData('naruto', this)">ناروتو</button>
        <button class="tab-btn" onclick="filterData('onepiece', this)">ون بيس</button>
        <button class="tab-btn" onclick="filterData('gumball', this)">غامبول</button>
        <button class="tab-btn" onclick="filterData('doraemon', this)">دورايمون</button>
    </div>

    <div class="container">
        <div class="grid" id="episodesGrid"></div>
    </div>

    <div id="playerPage">
        <div class="player-header">
            <button class="btn-action" onclick="closePlayer()">
                <span class="material-icons">arrow_forward</span> العودة للمنصة
            </button>
            <h2 id="currentTitle">اسم الحلقة</h2>
            <button class="btn-action" onclick="toggleTheater()">
                <span class="material-icons">visibility_off</span> وضع السينما
            </button>
        </div>

        <div class="video-container">
            <iframe id="videoFrame" src="" allowfullscreen allow="autoplay"></iframe>
            
            <div class="interaction-area">
                <div class="action-bar">
                    <button class="btn-action" onclick="handleLike(this)">
                        <span class="material-icons">thumb_up</span> <span id="lCount">450</span>
                    </button>
                    <button class="btn-action" onclick="alert('تمت الإضافة للمفضلات')">
                        <span class="material-icons">favorite</span> المفضلات
                    </button>
                    <button class="btn-action" onclick="share()">
                        <span class="material-icons">share</span> مشاركة
                    </button>
                    <button class="btn-action" style="background: var(--primary);" onclick="openInYoutube()">
                        <span class="material-icons">smart_display</span> المشاهدة في يوتيوب (حل مشكلة Unavailable)
                    </button>
                </div>

                <div class="desc-section">
                    <h3>نبذة عن الحلقة</h3>
                    <p id="currentDesc"></p>
                </div>

                <div class="comments-box">
                    <h3>التعليقات (12)</h3>
                    <input type="text" class="comment-input" placeholder="اكتب تعليقاً فصحى هنا...">
                    
                    <div class="comment-item">
                        <div class="avatar">ع</div>
                        <div style="flex:1">
                            <b style="font-size:14px">عمر الخطاب</b>
                            <p style="color:#ccc; margin-top:5px">حلقة أسطورية وتصميم الموقع مبهر جداً، شكراً لكم!</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const episodes = [
            // ناروتو
            { cat: 'naruto', title: 'ناروتو شيبودن: عودة الأسطورة', code: 'QY_oMofN_m0', desc: 'في هذه الحلقة، يعود ناروتو إلى قرية الورق المخفية بعد تدريب دام سنوات مع جيرايا، ليفاجأ بتغيرات كبيرة وتهديدات جديدة تلوح في الأفق.' },
            { cat: 'naruto', title: 'ناروتو شيبودن: هجوم الأكاتسكي', code: 'S2p_vU29K6w', desc: 'تبدأ منظمة الأكاتسكي تحركاتها الفعلية لاصطياد الوحوش ذات الذيول، وتبدأ المواجهة الأولى التي ستقرر مصير عالم النينجا.' },
            { cat: 'naruto', title: 'ناروتو شيبودن: اختبار الأجراس الجديد', code: 'm9un6pT020Q', desc: 'يخضع ناروتو وساكورا لاختبار جديد من كاكاشي سينسي لإظهار مدى تطور مهاراتهم القتالية والتكتيكية.' },
            { cat: 'naruto', title: 'ناروتو شيبودن: سر الرمال', code: 'N-0_D9m8i4c', desc: 'تتعرض قرية الرمال لهجوم مفاجئ، ويتحرك فريق كاكاشي لتقديم المساعدة في مهمة إنقاذ محفوفة بالمخاطر.' },
            { cat: 'naruto', title: 'ناروتو شيبودن: القوة الكامنة', code: 'ZfV67XnBv0I', desc: 'يواجه ناروتو تحديات داخلية للسيطرة على قوة الكيوبي بينما يشتد الصراع مع أعداء من رتبة S.' },

            // غامبول
            { cat: 'gumball', title: 'عالم غامبول: الفوضى الكبرى', code: 'MREt_954930', desc: 'مغامرة كوميدية حيث يحاول غامبول وداروين إصلاح جهاز التحكم عن بعد، مما يؤدي إلى تمزق في نسيج الواقع بمدينة إلمور.' },
            { cat: 'gumball', title: 'عالم غامبول: الاختبار الفاشل', code: 'kY8E0R-O7wU', desc: 'يحاول غامبول الهروب من امتحان الرياضيات بشتى الطرق المضحكة، ليكتشف أن الهروب أصعب من الامتحان نفسه.' },
            { cat: 'gumball', title: 'عالم غامبول: اليوم العالمي للكسل', code: 'vX5aF5ZfX_w', desc: 'ريتشارد يقرر كسر الرقم القياسي في الكسل، مما يدخل العائلة في سلسلة من المواقف العجيبة.' },
            { cat: 'gumball', title: 'عالم غامبول: الصديق الوفي', code: 'rP_z7mFmQ6o', desc: 'داروين يقرر حماية غامبول من كل خطر في العالم، ولكن حمايته الزائدة تصبح هي الخطر الحقيقي.' },
            { cat: 'gumball', title: 'عالم غامبول: سر الأسرار', code: '9hZ6v_49A6I', desc: 'يكتشف غامبول سراً مخبأً في قبو المنزل يغير نظرته لكل جيرانه في مدينة إلمور.' },

            // ون بيس
            { cat: 'onepiece', title: 'ون بيس: بداية ملك القراصنة', code: 'm9un6pT020Q', desc: 'انطلاق لوفي في قاربه الصغير بحثاً عن طاقم قوي لبدء أعظم رحلة في تاريخ البحار.' },
            { cat: 'onepiece', title: 'ون بيس: معركة الغراند لاين', code: 'QY_oMofN_m0', desc: 'دخول منطقة الغراند لاين حيث لا قوانين للطبيعة، وحيث ينتظر أقوى القراصنة في العالم.' },
            { cat: 'onepiece', title: 'ون بيس: إرادة الدي', code: 'S2p_vU29K6w', desc: 'كشف بعض الحقائق عن سر حرف الـ D وعلاقته بمستقبل العالم ومصير لوفي.' },
            { cat: 'onepiece', title: 'ون بيس: تحالف القراصنة', code: 'N-0_D9m8i4c', desc: 'لوفي يشكل تحالفاً غير متوقع لمواجهة أحد اليونكو في معركة حاسمة.' },
            { cat: 'onepiece', title: 'ون بيس: جزيرة الكنز', code: 'ZfV67XnBv0I', desc: 'الوصول لجزيرة غامضة تحتوي على خرائط قديمة تشير إلى مكان الون بيس الأسطوري.' },

            // دورايمون
            { cat: 'doraemon', title: 'دورايمون: عالم الفن العجيب', code: 'QY_oMofN_m0', desc: 'نوبيتا يستخدم أداة رسم الواقع ليحول غرفته إلى عالم فني حي، ولكن الأمور تخرج عن السيطرة.' },
            { cat: 'doraemon', title: 'دورايمون: رحلة الديناصورات', code: 'm9un6pT020Q', desc: 'العودة بالزمن لملايين السنين لإنقاذ ديناصور صغير تائه وإعادته لعائلته.' },
            { cat: 'doraemon', title: 'دورايمون: آلة الحظ', code: 'S2p_vU29K6w', desc: 'نوبيتا يحصل على حظ خارق ليوم واحد، ليكتشف أن الحظ الزائد له عواقب مضحكة.' },
            { cat: 'doraemon', title: 'دورايمون: الهروب من الواجب', code: 'N-0_D9m8i4c', desc: 'أداة جديدة تمنع أي شخص من سؤال نوبيتا عن واجباته المدرسية، مما يسبب فوضى في المدرسة.' },
            { cat: 'doraemon', title: 'دورايمون: مدينة المستقبل', code: 'ZfV67XnBv0I', desc: 'زيارة لمدينة دورايمون الأصلية في القرن الثاني والعشرين والتعرف على أصدقائه الآليين.' }
        ];

        const heroImages = [
            'https://wallpapercave.com/wp/wp1810629.jpg',
            'https://wallpapercave.com/wp/wp1852230.jpg',
            'https://wallpaperaccess.com/full/332219.jpg'
        ];

        let heroIndex = 0;
        let currentVideoCode = "";

        // عرض الحلقات
        function render(items) {
            const grid = document.getElementById('episodesGrid');
            grid.innerHTML = items.map((ep, index) => `
                <div class="card" onclick="playSelected(${episodes.indexOf(ep)})">
                    <div class="card-img">${ep.cat === 'naruto' ? '🦊' : (ep.cat === 'onepiece' ? '🏴‍☠️' : '🐱')}</div>
                    <div class="card-info">
                        <h3>${ep.title}</h3>
                        <p>${ep.desc.substring(0, 60)}...</p>
                    </div>
                </div>
            `).join('');
        }

        // فلترة
        function filterData(c, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(c === 'all' ? episodes : episodes.filter(e => e.cat === c));
        }

        // تشغيل الفيديو
        function playSelected(index) {
            const ep = episodes[index];
            currentVideoCode = ep.code;
            document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${ep.code}?autoplay=1&rel=0`;
            document.getElementById('currentTitle').innerText = ep.title;
            document.getElementById('currentDesc').innerText = ep.desc;
            document.getElementById('playerPage').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closePlayer() {
            document.getElementById('playerPage').style.display = 'none';
            document.getElementById('videoFrame').src = '';
            document.body.style.overflow = 'auto';
        }

        function openInYoutube() {
            window.open(`https://www.youtube.com/watch?v=${currentVideoCode}`, '_blank');
        }

        function toggleTheater() {
            const dimmer = document.getElementById('lightDimmer');
            dimmer.style.display = dimmer.style.display === 'block' ? 'none' : 'block';
        }

        function handleLike(btn) {
            btn.style.color = "var(--primary)";
            document.getElementById('lCount').innerText = "451";
        }

        function share() {
            alert("تم نسخ رابط الحلقة! شاركه الآن عبر واتساب أو تيليغرام.");
        }

        // تغيير صورة الهيرو تلقائياً
        setInterval(() => {
            heroIndex = (heroIndex + 1) % heroImages.length;
            document.getElementById('mainHero').style.backgroundImage = `url('${heroImages[heroIndex]}')`;
        }, 5000);

        render(episodes);
    </script>
</body>
</html>
