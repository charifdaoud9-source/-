<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس | التجربة الكاملة</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4500;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* الهيدر الزجاجي */
        header {
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 69, 0, 0.2);
        }

        .logo { color: var(--primary); font-size: 28px; font-weight: 900; text-decoration: none; letter-spacing: 1px; }

        /* الواجهة المتحركة (Hero) */
        .hero-slider {
            height: 75vh;
            width: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            padding: 0 5%;
        }

        .slide {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out, transform 4s linear;
            z-index: 1;
        }

        .slide.active { opacity: 1; z-index: 2; transform: scale(1.1); }

        .hero-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to top, var(--bg) 10%, transparent 70%),
                        linear-gradient(to right, var(--bg) 30%, transparent);
            z-index: 3;
        }

        .hero-content { position: relative; z-index: 4; max-width: 800px; animation: fadeInUp 1s ease; }
        .hero-content h1 { font-size: 4.5rem; margin: 0; text-shadow: 0 5px 20px #000; }
        .hero-content p { font-size: 1.4rem; color: #ddd; margin: 25px 0; line-height: 1.6; }

        /* التبويبات */
        .tabs-wrapper { padding: 25px 5%; position: sticky; top: 70px; z-index: 900; background: var(--bg); border-bottom: 1px solid #1a1a1a; }
        .tabs-list { display: flex; gap: 15px; overflow-x: auto; }
        .tab-item {
            background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 35px;
            border-radius: 50px; cursor: pointer; font-weight: bold; transition: 0.3s; white-space: nowrap;
        }
        .tab-item.active, .tab-item:hover { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 69, 0, 0.4); }

        /* شبكة الحلقات */
        .grid-container { padding: 40px 5%; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 35px; }
        .ep-card {
            background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222;
            transition: 0.4s; cursor: pointer;
        }
        .ep-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .ep-thumb { height: 150px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 50px; position: relative; }
        .ep-info { padding: 20px; }
        .ep-info h3 { margin: 0; font-size: 17px; color: #fff; line-height: 1.4; }
        .ep-info p { color: #888; font-size: 13px; margin-top: 10px; line-height: 1.5; }

        /* صفحة المشاهدة */
        #watchPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow-y: auto; }
        .player-nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        iframe { width: 90%; height: 75vh; border: none; border-radius: 10px; background: #111; }

        /* التعليقات */
        .comments-section { width: 90%; max-width: 1100px; margin: 30px auto; padding-top: 30px; border-top: 1px solid #222; }
        .comment-input-area { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .comment-input-area textarea { background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; resize: none; font-family: inherit; }
        .comment-btn { align-self: flex-start; background: var(--primary); color: white; border: none; padding: 10px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        .comment-item { display: flex; gap: 15px; margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #151515; }
        .avatar { width: 45px; height: 45px; background: #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--primary); }
        .comment-content b { font-size: 14px; color: var(--primary); }
        .comment-content p { margin: 5px 0 0; color: #ccc; font-size: 14px; line-height: 1.5; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <span class="material-icons" style="cursor:pointer">search</span>
    </header>

    <div class="hero-slider" id="slider">
        <div class="slide active" style="background-image: url('https://wallpapercave.com/wp/wp1810629.jpg')"></div>
        <div class="slide" style="background-image: url('https://wallpapercave.com/wp/wp1852230.jpg')"></div>
        <div class="slide" style="background-image: url('https://wallpaperaccess.com/full/332219.jpg')"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="heroTitle">عالم ناروتو</h1>
            <p id="heroDesc">استكشف أقوى معارك النينجا في تاريخ الأنمي، بجودة فائقة الدقة وباللغة العربية الفصحى.</p>
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-list">
            <button class="tab-item active" onclick="filter('all', this)">كل الحلقات</button>
            <button class="tab-item" onclick="filter('naruto', this)">ناروتو</button>
            <button class="tab-item" onclick="filter('gumball', this)">غامبول</button>
            <button class="tab-item" onclick="filter('onepiece', this)">ون بيس</button>
            <button class="tab-item" onclick="filter('doraemon', this)">دورايمون</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="episodes-grid" id="mainGrid"></div>
    </div>

    <div id="watchPage">
        <div class="player-nav">
            <button class="tab-item" onclick="closeWatch()"><span class="material-icons" style="vertical-align:middle">arrow_forward</span> العودة</button>
            <h2 id="watchTitle" style="margin:0">اسم الحلقة</h2>
            <div style="width:100px"></div>
        </div>
        <div style="display:flex; flex-direction:column; align-items:center; padding-top:20px;">
            <iframe id="videoIframe" src="" allowfullscreen></iframe>
            
            <div style="width:90%; padding:20px 0; display:flex; gap:15px;">
                <button class="tab-item" onclick="handleLike(this)"><span class="material-icons">thumb_up</span> أعجبني</button>
                <button class="tab-item"><span class="material-icons">share</span> مشاركة</button>
            </div>

            <div style="width:90%; background:#111; padding:25px; border-radius:15px; border-right:5px solid var(--primary);">
                <h3 style="color:var(--primary); margin-top:0;">وصف الحلقة</h3>
                <p id="watchDesc" style="line-height:1.8; color:#ccc; white-space: pre-line;"></p>
            </div>

            <div class="comments-section">
                <h3>التعليقات</h3>
                <div class="comment-input-area">
                    <textarea placeholder="اكتب تعليقك هنا باللغة العربية الفصحى..." rows="3"></textarea>
                    <button class="comment-btn">نشر التعليق</button>
                </div>
                <div id="commentsList">
                    </div>
            </div>
        </div>
    </div>

    <script>

            { cat: 'naruto', title: 'ناروتو شيبودن: سر مهارة كاكاشي الجديدة', desc: 'يخضع الفريق السابع لاختبار جديد من قبل كاكاشي سينسي، ليكتشفوا مدى تطورهم خلال فترة الغياب.\nيكشف كاكاشي عن قوة مرعبة لم يشهدها أحد من قبل، مما يضع ناروتو وساكورا في موقف لا يحسدان عليه.\nتتسم الحلقة بالإثارة البصرية العالية والتحولات التكتيكية في القتال، حيث يعتمد الجميع على ذكائهم قبل قوتهم.\nتنتهي الحلقة بمفاجأة تغير مجرى التدريب وتضع أسس القوة الجديدة التي سيعتمد عليها ناروتو لاحقاً.' },
            // ... سيتم توليد الـ 10 حلقات لكل نوع بنفس النمط
        ];

        // تكملة الـ 10 حلقات لكل كرتون بأسماء واقعية
        const categories = {
            'naruto': ['إنقاذ الكازيكاجي', 'مواجهة رمال الصحراء', 'قوة الساكيورا المفاجئة', 'تحطم حاجز الصمت', 'مطاردة الشينوبي', 'التسلل إلى مخبأ العدو', 'انفجار القوة الكامنة'],
            'gumball': ['يوم غ
