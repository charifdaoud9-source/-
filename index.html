<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس - مشاهدة مباشرة</title>
    <style>
        :root { --primary: #ff0000; --bg: #0a0a0a; --card-bg: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding-bottom: 50px; }
        
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .logo { color: var(--primary); font-size: 24px; font-weight: bold; text-decoration: none; }

        /* خلفية ناروتو الكبيرة */
        .hero {
            height: 65vh;
            background: linear-gradient(to top, var(--bg), transparent), url('https://wallpapercave.com/wp/wp1810629.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; padding: 0 5%;
        }

        .container { padding: 40px 5%; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }

        /* تصميم البطاقات النظيف (بدون صور) */
        .card {
            background: var(--card-bg); border-radius: 15px; padding: 40px 20px;
            text-align: center; cursor: pointer; transition: 0.3s ease;
            border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .card:hover { transform: translateY(-10px); border-color: var(--primary); background: #252525; box-shadow: 0 10px 25px rgba(255,0,0,0.2); }
        .card h3 { margin: 0; font-size: 20px; color: #fff; }
        .card p { margin-top: 10px; font-size: 14px; color: var(--primary); font-weight: bold; }

        /* مشغل الفيديو (Popup) */
        #videoOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center;
            flex-direction: column;
        }
        .video-container { width: 85%; max-width: 900px; position: relative; padding-bottom: 48%; height: 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 3px solid #333; border-radius: 15px; }
        .close-btn { margin-top: 25px; padding: 12px 40px; background: var(--primary); color: white; border: none; cursor: pointer; border-radius: 30px; font-weight: bold; font-size: 16px; transition: 0.2s; }
        .close-btn:hover { background: #cc0000; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <div style="font-size: 14px; color: #888;">أفضل تجربة مشاهدة</div>
    </header>

    <section class="hero">
        <div>
            <h1 style="font-size: 3.5rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.7);">ناروتو شيبودن</h1>
            <p style="font-size: 1.2rem; max-width: 500px; color: #ddd;">شاهد حلقاتك المفضلة الآن بجودة عالية وبدون إعلانات مزعجة.</p>
        </div>
    </section>

    <div class="container">
        <h2 style="margin-bottom: 30px; border-right: 4px solid var(--primary); padding-right: 15px;">اختر مسلسلك المفضل</h2>
        <div class="grid">
            
            <div class="card" onclick="openPlayer('https://www.youtube.com/embed/S2p_vU29K6w')">
                <h3>ون بيس</h3>
                <p>▶ شاهد الحلقة</p>
            </div>

            <div class="card" onclick="openPlayer('https://www.youtube.com/embed/QY_oMofN_m0')">
                <h3>ناروتو شيبودن</h3>
                <p>▶ شاهد الحلقة</p>
            </div>

            <div class="card" onclick="openPlayer('https://www.youtube.com/embed/m9un6pT020Q')">
                <h3>القناص</h3>
                <p>▶ شاهد الحلقة</p>
            </div>

            <div class="card" onclick="openPlayer('https://www.youtube.com/embed/N-0_D9m8i4c')">
                <h3>المحقق كونان</h3>
                <p>▶ شاهد الحلقة</p>
            </div>

        </div>
    </div>

    <div id="videoOverlay">
        <div class="video-container">
            <iframe id="videoFrame" src="" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
        <button class="close-btn" onclick="closePlayer()">إغلاق الفيديو ✕</button>
    </div>

    <script>
        function openPlayer(videoUrl) {
            // إضافة ميزة التشغيل التلقائي للرابط
            const autoPlayUrl = videoUrl + "?autoplay=1";
            document.getElementById('videoFrame').src = autoPlayUrl;
            document.getElementById('videoOverlay').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('videoFrame').src = ''; // إيقاف الفيديو عند الإغلاق
        }
    </script>

</body>
</html>
