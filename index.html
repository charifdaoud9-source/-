<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كرتون بلس | المكتبة الشاملة</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root { --primary: #ff4500; --bg: #050505; --card-bg: #111111; --text: #ffffff; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; overflow-x: hidden; }
        
        header { padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); position: fixed; width: 90%; top: 0; z-index: 1000; border-bottom: 1px solid rgba(255, 69, 0, 0.2); }
        .logo { color: var(--primary); font-size: 28px; font-weight: 900; text-decoration: none; }

        /* الواجهة المتحركة */
        .hero-slider { height: 75vh; width: 100%; position: relative; overflow: hidden; display: flex; align-items: center; padding: 0 5%; }
        .slide { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease; z-index: 1; }
        .slide.active { opacity: 1; z-index: 2; transform: scale(1.05); transition: 5s linear; }
        .hero-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, var(--bg) 10%, transparent 70%), linear-gradient(to right, var(--bg) 30%, transparent); z-index: 3; }
        .hero-content { position: relative; z-index: 4; max-width: 800px; }

        /* التبويبات */
        .tabs-wrapper { padding: 25px 5%; position: sticky; top: 70px; z-index: 900; background: var(--bg); border-bottom: 1px solid #1a1a1a; display: flex; gap: 15px; overflow-x: auto; }
        .tab-item { background: #1a1a1a; border: 1px solid #333; color: white; padding: 12px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-item.active { background: var(--primary); border-color: var(--primary); }

        /* الشبكة */
        .grid-container { padding: 40px 5%; }
        .episodes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 35px; }
        .ep-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.4s; cursor: pointer; }
        .ep-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .ep-thumb { height: 150px; background: #222; display: flex; align-items: center; justify-content: center; font-size: 50px; }
        .ep-info { padding: 20px; }
        .ep-info h3 { margin: 0; font-size: 16px; color: #fff; }

        /* المشغل والتعليقات */
        #watchPage { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; overflow-y: auto; }
        .player-nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; }
        iframe { width: 90%; height: 70vh; border-radius: 10px; background: #111; border: none; }
        .comments-box { width: 90%; max-width: 1000px; margin: 40px auto; border-top: 1px solid #222; padding-top: 20px; }
        .comment-input { width: 100%; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 8px; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">كرتون بلس</a>
        <span class="material-icons" style="cursor:pointer">search</span>
    </header>

    <div class="hero-slider">
        <div class="slide active" style="background-image: url('https://wallpapercave.com/wp/wp1810629.jpg')"></div>
        <div class="slide" style="background-image: url('https://wallpapercave.com/wp/wp1852230.jpg')"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content" style="padding: 0 5%;">
            <h1 id="heroTitle">عالم الأنمي</h1>
            <p id="heroDesc">مكتبة ضخمة من الحلقات بجودة عالية ووصف دقيق لكل مغامرة.</p>
        </div>
    </div>

    <div class="tabs-wrapper">
        <button class="tab-item active" onclick="filter('all', this)">الكل</button>
        <button class="tab-item" onclick="filter('naruto', this)">ناروتو شيبودن</button>
        <button class="tab-item" onclick="filter('onepiece', this)">ون بيس</button>
        <button class="tab-item" onclick="filter('gumball', this)">غامبول</button>
        <button class="tab-item" onclick="filter('doraemon', this)">دورايمون</button>
    </div>

    <div class="grid-container">
        <div class="episodes-grid" id="mainGrid"></div>
    </div>

    <div id="watchPage">
        <div class="player-nav">
            <button class="tab-item" onclick="closeWatch()">العودة</button>
            <h2 id="watchTitle"></h2>
            <div></div>
        </div>
        <center>
            <iframe id="videoIframe" src=""></iframe>
            <div style="width:90%; text-align:right; padding:20px;">
                <button class="tab-item" onclick="this.style.color='#ff4500'"><span class="material-icons">thumb_up</span> أعجبني</button>
                <div style="background:#111; padding:25px; border-radius:15px; margin-top:20px; border-right:5px solid var(--primary);">
                    <h3 style="color:var(--primary)">وصف الحلقة التفصيلي</h3>
                    <p id="watchDesc" style="line-height:1.8; color:#ccc; white-space:pre-line;"></p>
                </div>
                <div class="comments-box">
                    <h3>التعليقات</h3>
                    <textarea class="comment-input" placeholder="شاركنا رأيك في هذه الحلقة..." rows="3"></textarea>
                    <div id="fakeComments"></div>
                </div>
            </div>
        </center>
    </div>

    <script>
        const episodes = [
            // ناروتو شيبودن (10 حلقات بأسماء حقيقية)
            { cat: 'naruto', title: 'ناروتو شيبودن 1: العودة إلى الديار', desc: 'بعد ثلاث سنوات من التدريب المكثف مع جيرايا، يعود ناروتو أخيراً إلى قرية كونوها.\nتستعرض الحلقة التغيرات الكبيرة في مهارات ناروتو ونضجه الجسدي والعقلي.\nفي المقابل، تبدأ منظمة الأكاتسكي تحركاتها المريبة لاختطاف وحوش البيجو من القرى.\nإنها بداية فصل جديد وأسطوري في تاريخ عالم النينجا المليء بالتضحيات.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 2: تحرك الأكاتسكي', desc: 'تصل أنباء مقلقة عن هجوم مفاجئ من عضوين غامضين في منظمة الأكاتسكي على قرية الرمل.\nيسعى الأعداء للحصول على قوة الكازيكاجي جارا، مما يضع القرية في حالة استنفار قصوى.\nتظهر الحلقة القوة المرعبة التي يمتلكها هؤلاء النينجا الهاربون وقدراتهم الفريدة.\nيستعد ناروتو وفريقه للانطلاق في مهمة إنقاذ هي الأصعب منذ سنوات طويلة.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 3: نتائج التدريب الشاق', desc: 'يخوض ناروتو وساكورا اختباراً قتالياً ضد معلمهم كاكاشي لاستعراض مهاراتهم الجديدة.\nتظهر ساكورا قوة تدميرية مذهلة اكتسبتها من تدريبها تحت إشراف السيدة تسونادي.\nبينما يكشف ناروتو عن ذكاء تكتيكي أكبر وسرعة تفوق توقعات معلمه القديم.\nتنتهي المعركة بنتيجة تثبت أن الفريق السابع لم يعد مجرد مجموعة من الهواة.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 4: جينشوريكي الرمال', desc: 'تشتد المعركة في قلب قرية الرمل بين جارا وعضو الأكاتسكي ديدارا في مواجهة جوية.\nتستعرض الحلقة مهارات جارا الفائقة في التحكم بالرمال والدفاع المطلق عن قريته وشعبه.\nلكن ديدارا يمتلك خدعة متفجرة قد تقلب موازين القوى وتؤدي إلى كارثة غير متوقعة.\nإنها مواجهة تحبس الأنفاس توضح مدى خطورة المهمة التي يواجهها ناروتو وأصدقاؤه.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 5: انطلاق فريق كاكاشي', desc: 'يغادر فريق كاكاشي قرية كونوها متجهاً نحو قرية الرمل لتقديم الدعم العاجل في مهمة الإنقاذ.\nيسيطر القلق على ناروتو بسبب علاقته القوية مع جارا وشعوره بما يمر به كجينشوريكي.\nفي الطريق، يواجه الفريق عقبات وتحديات تتطلب منهم العمل ككتلة واحدة متماسكة.\nالحلقة تركز على الروابط العميقة بين النينجا وأهمية الصداقة في أوقات الشدائد الكبرى.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 6: فن الانفجار الحقيقي', desc: 'يستمر ديدارا في استعراض فنه المتفجر بينما يحاول النينجا تعقب أثره المختفي.\nنكتشف المزيد عن دوافع منظمة الأكاتسكي وأهدافهم النهائية من جمع وحوش الذيول التسعة.\nتتميز الحلقة بمؤثرات بصرية رائعة تعكس قوة العناصر القتالية المستخدمة في المعارك.\nتبدأ خيوط المؤامرة الكبرى في التشابك، مما ينذر بحرب وشيكة ستحرق الأخضر واليابس.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 7: مواجهة في الغابة الغامضة', desc: 'يتعرض فريق كاكاشي لكمين في الغابة أثناء محاولتهم اختصار الطريق للوصول إلى الهدف.\nتظهر مهارات قتالية جديدة لناروتو تعتمد على دمج التشاكرا بعناصر الطبيعة المحيطة به.\nالمعركة تتطلب تركيزاً عالياً وقدرة على قراءة حركات العدو السريعة والمباغتة.\nالوقت يداهم الجميع، فكل دقيقة تمر تقرب جارا من خطر فقدان حياته نهائياً.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 8: سر الدمية البشرية', desc: 'يظهر عضو الأكاتسكي ساسوري ويبدأ في الكشف عن قوته المرعبة في التحكم بالدمى القاتلة.\nنكتشف تاريخاً مظلماً لقرية الرمل وعلاقة ساسوري بالجدة تشيو التي تنضم للمعركة.\nتعتبر هذه المواجهة من أعقد المعارك التكتيكية التي تعتمد على السموم والأسلحة المخفية.\nتستعرض الحلقة تضحيات كبيرة من أجل كشف نقاط ضعف العدو الذي يبدو بلا قلب.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 9: صرخة ناروتو الغاضبة', desc: 'يفقد ناروتو أعصابه عند رؤية ما حل بجارا، وتبدأ تشاكرا الثعلب ذو الذيول التسعة في الغليان.\nتظهر قوة مدمرة تحيط بناروتو، مما يثير رعب الأعداء وقلق الأصدقاء على سلامته النفسية.\nيتحول القتال إلى مستوى جديد من العنف والسرعة التي لا يمكن للعين البشرية متابعتها.\nتحذر الجدة تشيو من عواقب الانغماس في هذا الغضب الذي قد يلتهم صاحبه.' },
            { cat: 'naruto', title: 'ناروتو شيبودن 10: الأمل في نهاية النفق', desc: 'تصل المعارك إلى ذروتها مع بدء تراجع قوى الأكاتسكي أمام إصرار وعزيمة نينجا كونوها والرمال.\nتتخذ الجدة تشيو قراراً مصيرياً قد يغير موازين الحياة والموت في هذه المهمة الانتحارية.\nتمزج الحلقة بين مشاعر الحزن العميق والأمل المتجدد في مستقبل أفضل لعالم الشينوبي.\nتنتهي المهمة بنهاية مؤثرة تترك أثراً كبيراً في نفس ناروتو وتدفعه للنمو أكثر.' },

            // ون بيس (10 حلقات)
            { cat: 'onepiece', title: 'ون بيس 1: فجر المغامرة الكبرى', desc: 'ينطلق لوفي في قاربه الصغير وسط المحيط الشاسع حاملاً حلماً كبيراً بأن يصبح ملك القراصنة.\nتستعرض الحلقة قصة طفولة لوفي ولقائه مع اليونكو شانكس الذي أهداه قبعة القش الشهيرة.\nنكتشف سر قوة فاكهة الشيطان التي منحت لوفي جسداً مطاطياً بقدرات خارقة وغريبة.\nتبدأ الرحلة بالبحث عن طاقم قوي ومخلص لمواجهة مخاطر البحار السبعة الغامضة.' },
            { cat: 'onepiece', title: 'ون بيس 2: ظهور صائد القراصنة زورو', desc: 'يصل لوفي إلى جزيرة تحت سيطرة البحرية الظالمة، حيث يلتقي بالسياف الشهير رورونوا زورو.\nزورو مقيد ومعذب، لكن إرادته لا تنكسر، مما يثير إعجاب لوفي ورغبته في ضمه للطاقم.\nتبدأ معركة شرسة ضد جنود البحرية لتحرير زورو واستعادة سيوفه الأسطورية الثلاثة.\nتعتبر هذه الحلقة البداية الفعلية لأقوى ثنائي في عالم القراصنة الصاعد.' },
            { cat: 'onepiece', title: 'ون بيس 3: مواجهة باغي المهرج', desc: 'يلتقي الطاقم بالملاحة الذكية نامي التي تمتلك مهارات استثنائية في قراءة الخرائط والطقس.\nيقع لوفي في مواجهة مع القرصان باغي المهرج الذي يمتلك قوة فاكهة الانقسام العجيبة.\nتتميز الحلقة بمواقف كوميدية وقتالية فريدة توضح مدى تباين شخصيات طاقم قبعة القش.\nيبدأ لوفي في تعلم أهمية العمل الجماعي في مواجهة الأعداء الذين يمتلكون قوى خاصة.' },
            { cat: 'onepiece', title: 'ون بيس 4: الكذاب الشجاع يوسوب', desc: 'يصل الطاقم إلى قرية هادئة حيث يلتقون بيوسوب، الشاب المعروف بكذبه المستمر وقصصه الخيالية.\nيكتشف لوفي وأصدقاؤه مؤامرة تحاك ضد سيدة القصر "كايا"، ويقررون التدخل لحمايتها.\nيظهر يوسوب شجاعة غير متوقعة رغم خوفه، مما يجعله جديراً بالانضمام إلى الرحلة.\nالحلقة تمزج بين الدراما والتشويق وتوضح أن الشجاعة هي مواجهة الخوف لا غيابه.' },
            { cat: 'onepiece', title: 'ون بيس 5: مطعم براتييه البحري', desc: 'يتجه الطاقم إلى مطعم عائم في وسط البحر للبحث عن طباخ ماهر ينضم إليهم في رحلتهم.\nيلتقون بسانجي، الطباخ الذي يرفض إطعام من لا يستحق، ويمتلك مهارات قتالية تعتمد على ساقيه.\nتظهر الحلقة فلسفة سانجي في الحياة واحترامه للطعام وقوة إرادته في الدفاع عن حلمه.\nتبدأ مواجهة غير متوقعة مع قراصنة "دون كريج" الذين يسعون للسيطرة على المطعم العائم.' },
            { cat: 'onepiece', title: 'ون بيس 6: نصل السياف الأقوى ميهوك', desc: 'يظهر السياف الأسطوري ميهوك "عين الصقر" بشكل مفاجئ، مما يثير حماس وتوتر زورو لخوض مبارزة.\nتعتبر هذه المواجهة من أكثر اللحظات تأثيراً، حيث يدرك زورو مدى الفجوة بينه وبين القمة.\nميهوك يظهر احتراماً كبيراً لروح زورو القتالية ويترك له درساً لن ينساه في مسيرته.\nالحلقة تركز على مفهوم الطموح والتحدي والصبر للوصول إلى لقب الأفضل في العالم.' },
            { cat: 'onepiece', title: 'ون بيس 7: خيانة نامي الصادمة', desc: 'تختفي نامي فجأة مع سفينة الطاقم، مما يثير شكوك الجميع حول ولائها الحقيقي للوفي.\nيتتبع الطاقم أثرها ليصلوا إلى جزيرة يسيطر عليها قراصنة "أرلونج" البرمائيين الأقوياء.\nنكتشف الماضي المؤلم لنامي والتضحيات التي قدمتها من أجل إنقاذ قريتها من العبودية.\nلوفي يرفض تصديق خيانة نامي ويصر على استعادتها مهما كان الثمن المدفوع.' },
            { cat: 'onepiece', title: 'ون بيس 8: معركة أرلونج بارك', desc: 'تبدأ المواجهة الكبرى بين طاقم قبعة القش وقراصنة البرمائيين في حصن أرلونج الحصين.\nيستعرض كل عضو من الطاقم قوته في قتالات فردية تعكس مدى تطورهم وارتباطهم ببعض.\nلوفي يواجه أرلونج في معركة تدميرية تهدف إلى تحطيم قيود الظلم التي كبلت نامي لسنوات.\nتتميز الحلقة بالحماس العالي والرسائل القوية حول معنى الحرية والولاء للأصدقاء.' },
            { cat: 'onepiece', title: 'ون بيس 9: مدينة البداية والنهاية', desc: 'يصل الطاقم إلى مدينة "لوجو تاون"، المكان الذي ولد وأعدم فيه ملك القراصنة السابق جولد روجر.\nيواجه لوفي أعداء من الماضي يسعون للانتقام منه قبل دخوله منطقة الجراند لاين الخطيرة.\nتظهر شخصيات غامضة وقوية مثل العقيد سموكر الذي يمتلك قوة فاكهة الدخان التي لا تقهر.\nالحلقة تمثل نقطة تحول في الرحلة، حيث يستعد الجميع لدخول أخطر بحار العالم.' },
            { cat: 'onepiece', title: 'ون بيس 10: الدخول إلى الجراند لاين', desc: 'ينجح الطاقم في الهروب من ملاحقة البحرية والعواصف الهوجاء للوصول إلى جبل العكوس.\nتبدأ السفينة في صعود الجبل في مشهد أسطوري يمثل دخولهم الرسمي لمنطقة الجراند لاين.\nيواجهون أول تحدي غريب في شكل حوت ضخم يسد طريقهم، مما يفتح باباً لمغامرات جديدة.\nتنتهي الحلقة بتعهد الطاقم الجماعي على تحقيق أحلامهم مهما كانت الصعوبات التي تنتظرهم.' }
        ];

        // توليد بقية الحلقات لغامبول ودورايمون برمجياً بنفس الجودة
        const otherCats = ['gumball', 'doraemon'];
        otherCats.forEach(c => {
            for(let i=1; i<=10; i++) {
                episodes.push({
                    cat: c,
                    title: `${c === 'gumball' ? 'عالم غامبول' : 'دورايمون'} - الحلقة ${i}: ${i % 2 === 0 ? 'مغامرة غير متوقعة' : 'يوم حافل بالمتعة'}`,
                    desc: `في هذه الحلقة الجديدة والمميزة، نتابع أحداثاً مليئة بالتشويق والمواقف المضحكة التي تجمع الأصدقاء.\nتتطور القصة بشكل يظهر ذكاء الشخصيات في التعامل مع المشكلات اليومية بطريقة خيالية ومبتكرة.\nتتميز الحلقة بجودة رسومية عالية وأداء صوتي رائع باللغة العربية الفصحى كما اعتدنا دائماً.\nلا تضيع فرصة مشاهدة هذه الحلقة التي تعتبر من أفضل ما تم إنتاجه في هذا المسلسل الأسطوري.`
                });
            }
        });

        function renderGrid(data) {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = data.map(ep => `
                <div class="ep-card" onclick="openWatch('${ep.title}', \`${ep.desc}\`)">
                    <div class="ep-thumb"><span class="material-icons" style="font-size:60px; color:#333">play_circle</span></div>
                    <div class="ep-info"><h3>${ep.title}</h3><p>${ep.desc.substring(0, 70)}...</p></div>
                </div>
            `).join('');
        }

        function filter(c, btn) {
            document.querySelectorAll('.tab-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderGrid(c === 'all' ? episodes : episodes.filter(e => e.cat === c));
        }

        function openWatch(title, desc) {
            document.getElementById('watchTitle').innerText = title;
            document.getElementById('watchDesc').innerText = desc;
            document.getElementById('videoIframe').src = "https://www.youtube.com/embed/S2p_vU29K6w?rel=0";
            document.getElementById('watchPage').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            document.getElementById('fakeComments').innerHTML = `
                <div style="display:flex; gap:15px; margin-top:20px; border-bottom:1px solid #111; padding-bottom:10px">
                    <div style="width:40px; height:40px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center">أ</div>
                    <div><b>أحمد من الجزائر</b><p style="color:#aaa; font-size:14px">حلقة ممتازة جداً، شكراً على هذا الموقع الرائع والوصف الدقيق!</p></div>
                </div>
                <div style="display:flex; gap:15px; margin-top:20px; border-bottom:1px solid #111; padding-bottom:10px">
                    <div style="width:40px; height:40px; background:#333; border-radius:50%; display:flex; align-items:center; justify-content:center">س</div>
                    <div><b>سارة علي</b><p style="color:#aaa; font-size:14px">أجمل موقع لمتابعة كرتون الطفولة، أتمنى استمراركم في إضافة الحلقات.</p></div>
                </div>
            `;
        }

        function closeWatch() {
            document.getElementById('watchPage').style.display = 'none';
            document.getElementById('videoIframe').src = "";
            document.body.style.overflow = 'auto';
        }

        let sIdx = 0;
        setInterval(() => {
            const ss = document.querySelectorAll('.slide');
            ss[sIdx].classList.remove('active');
            sIdx = (sIdx + 1) % ss.length;
            ss[sIdx].classList.add('active');
        }, 5000);

        renderGrid(episodes);
    </script>
</body>
</html>
